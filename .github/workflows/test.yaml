name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev imagemagick

      - name: Clean Maven cache
        run: mvn dependency:purge-local-repository

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve dependencies
        run: mvn install -DskipTests

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: npx playwright install chromium

      # Проверка конфигурационных файлов
      - name: Verify and debug config files for ${{ matrix.env }}
        run: |
          echo "=== DEBUG: Environment variables ==="
          echo "Current env: ${{ matrix.env }}"
          echo "ALLURE_RESULTS_DIR: $ALLURE_RESULTS_DIR"

          echo "=== DEBUG: File system ==="
          ls -la src/test/resources/ || echo "src/test/resources/ not found"

          CONFIG_FILE="src/test/resources/config-${{ matrix.env }}.properties"
          if [ -f "$CONFIG_FILE" ]; then
            echo "✅ Config file found: $CONFIG_FILE"
            echo "=== Config file content ==="
            cat "$CONFIG_FILE"

            # Проверка наличия baseUrl и его значения
            if grep -q "^baseUrl=" "$CONFIG_FILE"; then
              BASE_URL=$(grep "^baseUrl=" "$CONFIG_FILE" | cut -d'=' -f2-)
              echo "baseUrl: '$BASE_URL'"
              if [ -z "$BASE_URL" ]; then
                echo "❌ ERROR: baseUrl is empty in config!"
                exit 1
              fi
            else
              echo "❌ ERROR: baseUrl parameter not found!"
              exit 1
            fi
          else
            echo "❌ ERROR: Config file not found!"
            exit 1
          fi

      # Запуск тестов с Xvfb
      - name: Run all tests with Xvfb for ${{ matrix.env }} environment
        run: |
          export DISPLAY=:0
          Xvfb :0 -screen 0 1280x720x24 >/dev/null 2>&1 &
          echo "Running tests with env=${{ matrix.env }}"
          mvn test -B -Denv=${{ matrix.env }}
        env:
          ALLURE_RESULTS_DIR: target/allure-results

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report -B

      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.env }}
          path: target/site/allure-maven-plugin
          retention-days: 30